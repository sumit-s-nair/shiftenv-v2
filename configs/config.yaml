model:
  name: "Qwen/Qwen2.5-7B-Instruct"
  revision: ""                  # Optional: pin a commit/tag to avoid remote-code drift
  quantization: "4bit"           # QLoRA via Unsloth / bitsandbytes
  max_tokens: 512        # max completion tokens (generated Rust)
  max_prompt_tokens: 512 # max prompt tokens (C source); caps the 32K TRL default
  temperature: 0.2

training:
  max_episodes: 1000
  max_retries_per_module: 5
  learning_rate: 1.0e-5
  algorithm: "GRPO"              # Group Relative Policy Optimization
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.0
  group_size: 4                  # GRPO: generations per prompt
  per_device_train_batch_size: 4 # global batch must be divisible by group_size
  gradient_accumulation_steps: 4
  clip_epsilon: 0.2
  kl_coeff: 0.1

reward:
  unsafe_penalty_per_block: -0.1
  performance_bonus: 0.2
  clippy_bonus: 0.1

env:
  data_dir: "data/c_programs"
  temp_dir: "/tmp/c2rust"
  timeout_seconds: 30
  run_clippy: true

compute:
  hardware: "nvidia-l40s"        # 48GB VRAM; Qwen2.5-7B needs ~10 GB at 4-bit
  budget_usd: 90
  max_hours: 36
  cost_per_hour: 1.80

logging:
  wandb_project: "c2rust-rl"
  log_every_n_episodes: 10
  save_checkpoint_every: 100

hub:
  repo_id: ""          # set to "YOUR_HF_USERNAME/c2rust-qwen2.5-7b"
  private: false       # set true to keep the model private until ready
